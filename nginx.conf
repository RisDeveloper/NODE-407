server {
    listen 80 default_server;
    root /var/www/html;
    index index.html index.php;
    absolute_redirect off;

    # Root → serve index.html (no redirect, no loop)
    location = / {
        try_files /index.html /chat.php;
    }

    # Clean URLs: /chat → /chat.html, /admin → /admin.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # /index.html → /
    location = /index.html {
        return 301 /;
    }

    # .html → clean URL redirect (skip /, /index.html handled above)
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
